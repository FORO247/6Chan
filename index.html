<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6Chan - Tablones</title>
    <style>
        /* Estética base */
        body { 
            background-color: #E0F2F1; 
            color: #800000; font-family: arial,helvetica,sans-serif; margin: 0; padding: 0;
            transition: background-color 0.4s ease; /* Transición suave de color */
        }

        /* Pantalla de Inicio */
        #home-screen { text-align: center; padding: 40px 20px; }
        .libelula { width: 100px; height: 100px; margin-bottom: 10px; }
        h1 { font-size: 3rem; color: #AF0A0F; margin: 0; }

        .legal-notice { 
            max-width: 700px; margin: 30px auto; padding: 20px; 
            background: rgba(255,255,255,0.8); border: 2px solid #AF0A0F; 
            font-size: 10pt; line-height: 1.5; color: #333; text-align: justify;
        }

        /* Lista de Salas */
        .board-list { 
            max-width: 700px; margin: 20px auto; display: flex; flex-wrap: wrap; 
            justify-content: center; gap: 15px; padding: 0;
        }
        .board-card {
            background: #D6DAF0; border: 1px solid #B7C5D9; padding: 15px 25px;
            text-decoration: none; color: #34345C; font-weight: bold; font-size: 14pt;
            transition: all 0.2s; min-width: 120px;
        }
        .board-card:hover { background: #AF0A0F; color: white; }

        /* Ventana de Chat (Limpia) */
        #chat-window { display: none; padding: 10px; max-width: 900px; margin: 0 auto; position: relative; }
        
        .window-header { 
            text-align: center; 
            padding: 20px 0; 
            margin-bottom: 10px;
        }
        
        /* Botón Volver Arriba a la Derecha */
        .back-link { 
            position: absolute; 
            top: 20px; 
            right: 10px; 
            color: #AF0A0F; 
            text-decoration: none; 
            font-weight: bold;
            border: 1px solid #AF0A0F; 
            padding: 5px 12px;
            background: rgba(255,255,255,0.5);
        }
        .back-link:hover { background: #AF0A0F; color: white; }

        /* Estilos de Posts */
        .post { background-color: rgba(214, 218, 240, 0.9); border: 1px solid #B7C5D9; padding: 10px; margin-bottom: 10px; }
        .is-reply { margin-left: 25px; border-left: 3px solid #B7C5D9; }
        .post-info { font-size: 9pt; color: #117743; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; }
        .post-message { color: #000; word-wrap: break-word; white-space: pre-wrap; font-size: 11pt; }
        .post-media { max-width: 100%; max-height: 350px; display: block; margin: 10px 0; border: 1px solid #AAA; }
        .name-admin { color: #FF0000 !important; font-weight: bold; }
        .btn-delete { color: red; cursor: pointer; font-size: 8pt; margin-left: 10px; }

        /* Formulario */
        .post-form table { background-color: rgba(214, 218, 240, 0.9); border: 1px solid #B7C5D9; width: 100%; max-width: 500px; margin: 0 auto 20px auto; border-collapse: collapse; }
        .post-form td { border: 1px solid #B7C5D9; padding: 5px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #AAA; }
        #btnPostear { width: 100%; padding: 10px; background: #eee; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="home-screen">
    <svg class="libelula" viewBox="0 0 100 100">
        <ellipse cx="50" cy="50" rx="4" ry="25" fill="#00796B" transform="rotate(-15 50 50)"/>
        <circle cx="43" cy="30" r="6" fill="#00796B"/>
        <ellipse cx="65" cy="35" rx="25" ry="8" fill="rgba(0, 188, 212, 0.6)" transform="rotate(-30 65 35)"/>
        <ellipse cx="30" cy="55" rx="25" ry="8" fill="rgba(0, 188, 212, 0.6)" transform="rotate(-30 30 55)"/>
    </svg>
    <h1>6Chan</h1>
    
    <div class="legal-notice">
        “El usuario es el único responsable del contenido que publica. La plataforma actúa como intermediaria y podrá remover contenido y/o suspender cuentas ante incumplimientos o requerimientos legales.”
    </div>

    <div class="board-list">
        <a href="" class="board-card">Random</a>
        <a href="#vg" class="board-card">Videojuegos</a>
        <a href="#tech" class="board-card">Tecnologia</a>
        <a href="#pol" class="board-card">Política</a>
    </div>
</div>

<div id="chat-window">
    <a href="#" class="back-link">Volver</a>
    <div class="window-header">
        <h2 id="titulo-sala" style="margin:0; color:#AF0A0F; font-size: 24pt;">Sala</h2>
    </div>

    <div class="post-form">
        <table>
            <tr><td style="background:#98E; color:white; width:60px;">Nombre</td><td><input type="text" id="nombre" placeholder="Anónimo"></td></tr>
            <tr><td style="background:#98E; color:white;">Mensaje</td><td><textarea id="comentario" rows="3"></textarea></td></tr>
            <tr><td style="background:#98E; color:white;">Archivo</td><td><input type="file" id="archivo" accept="image/*,video/*"></td></tr>
            <tr><td colspan="2"><button id="btnPostear">Enviar Post</button></td></tr>
        </table>
    </div>

    <div id="board">Cargando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://lpdgjcnlweezlnqvufgq.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_4-KbL6m-qggsp9Kj0cP5Jw_s5bv_FIW';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const LLAVE_MAESTRA = "Cristopher.35"; 
    let salaActual = 'home';

    // CONFIGURACIÓN DE COLORES POR SALA
    const coloresSalas = {
        'home': '#E0F2F1', // Color original
        'b': '#F5F5DC',    // Beige para Random
        'vg': '#E8F5E9',   // Verde suave para Videojuegos
        'tech': '#E3F2FD', // Azul suave para Tech
        'pol': '#FFEBEE'   // Rojo muy suave para Política
    };

    async function procesarRuta() {
        const hash = window.location.hash.replace('#', '');
        
        if (!hash || hash === "") {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('chat-window').style.display = 'none';
            document.body.style.backgroundColor = coloresSalas['home'];
            salaActual = 'home';
        } else {
            const nombresSalas = {
                'b': 'Random',
                'vg': 'Videojuegos',
                'tech': 'Tecnología',
                'pol': 'Política'
            };

            salaActual = hash;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('chat-window').style.display = 'block';
            
            // Cambiar color de fondo según la sala
            document.body.style.backgroundColor = coloresSalas[hash] || '#FFFFFF';
            
            const nombre = nombresSalas[hash] || hash.toUpperCase();
            document.getElementById('titulo-sala').innerText = `/${hash}/ - ${nombre}`;
            
            cargarPosts();
        }
    }

    window.addEventListener('hashchange', procesarRuta);
    window.addEventListener('load', procesarRuta);

    // ... (Mantener las funciones cargarPosts, borrarPost y btnPostear.onclick igual que antes)
    async function cargarPosts() {
        if(salaActual === 'home') return;
        const { data: posts, error } = await _supabase.from('posts').select('*').eq('board', salaActual).order('id', { ascending: false });
        if (error) return;
        const board = document.getElementById('board');
        const miNombre = document.getElementById('nombre').value.trim();
        const soyAdmin = (miNombre === LLAVE_MAESTRA);
        board.innerHTML = "";
        posts.forEach(post => {
            let mediaHtml = post.url ? `<a href="${post.url}" target="_blank"><img src="${post.url}" class="post-media"></a>` : "";
            const esAdminPost = post.nombre.includes("RootMaster");
            const btnEliminar = soyAdmin ? `<span class="btn-delete" onclick="borrarPost(${post.id})">[BORRAR]</span>` : "";
            board.innerHTML += `
                <div class="post ${esAdminPost ? 'post-admin' : ''} ${post.parent_id ? 'is-reply' : ''}">
                    <div class="post-info"><span>${post.nombre}</span> | No.${post.id} ${btnEliminar}</div>
                    ${mediaHtml}
                    <div class="post-message">${post.mensaje}</div>
                </div>`;
        });
    }

    document.getElementById('btnPostear').onclick = async () => {
        const rawNombre = document.getElementById('nombre').value.trim();
        const mensaje = document.getElementById('comentario').value;
        const archivo = document.getElementById('archivo').files[0];
        if (!mensaje && !archivo) return;
        let nombreFinal = rawNombre || "Anónimo";
        if (rawNombre === LLAVE_MAESTRA) nombreFinal = "### RootMaster ###";
        let publicURL = null;
        if (archivo) {
            const nA = Date.now() + "_" + archivo.name;
            await _supabase.storage.from('archivos').upload(nA, archivo);
            publicURL = _supabase.storage.from('archivos').getPublicUrl(nA).data.publicUrl;
        }
        await _supabase.from('posts').insert([{ nombre: nombreFinal, mensaje: mensaje, url: publicURL, board: salaActual }]);
        document.getElementById('comentario').value = "";
        document.getElementById('archivo').value = "";
    };

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => { cargarPosts(); }).subscribe();

    async function borrarPost(id) {
        if(confirm("¿Borrar post?")) await _supabase.from('posts').delete().eq('id', id);
    }
</script>
</body>
</html>
